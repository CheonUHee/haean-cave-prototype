<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>해안 동굴 — 맵 에디터</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background:#141420; color:#ddd; font:13px/1.5 system-ui, sans-serif;
         display:flex; gap:10px; padding:10px; height:100vh; overflow:hidden; }
  #board { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:center; }
  canvas { background:#1b1b2c; border-radius:6px; cursor:crosshair; }
  #panel { width:430px; overflow-y:auto; background:#1d1d30; border-radius:6px; padding:12px; flex-shrink:0; }
  #panel h3 { color:#7ee0ee; font-size:13px; margin:12px 0 4px; }
  #panel label { display:flex; align-items:center; gap:6px; margin:3px 0; }
  #panel label span.k { flex:1; }
  #panel input[type=text], #panel input[type=number], #panel select {
    background:#2c2c4a; color:#ddd; border:1px solid #444; border-radius:4px; padding:3px 6px; }
  #panel input[type=number] { width:64px; }
  #panel button { background:#2c2c4a; color:#ddd; border:1px solid #444; border-radius:4px;
                  padding:4px 10px; margin:2px 2px 2px 0; cursor:pointer; }
  #panel button:hover { background:#3a3a60; }
  #panel button.on { background:#3d6ea5; border-color:#5b9bd5; }
  #tools button { min-width:64px; }
  #tools .tool-group { color:#8a86a8; font-size:11px; font-weight:bold; margin:6px 0 2px; }
  #tools button.edit { background:#3a3050; border-color:#6a5a8a; }
  #tools button.edit.on { background:#3d6ea5; border-color:#5b9bd5; }
  .help div { margin:3px 0; font-size:12px; color:#9ab; }
  .help b { color:#7ee0ee; }
  #report { white-space:pre-wrap; font-size:12px; margin-top:6px; }
  #report .err { color:#ff8f9f; }
  #report .warn { color:#ffd257; }
  #report .ok { color:#8fe98f; }
  #inspector { background:#232338; border-radius:6px; padding:8px; margin-top:6px; }
</style>
</head>
<body>
  <div id="board"><canvas id="canvas"></canvas></div>
  <div id="panel"></div>
  <script type="module" src="./editor/editor.js"></script>
</body>
</html>
